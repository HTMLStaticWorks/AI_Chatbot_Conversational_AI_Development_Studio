<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Base - AI Chatbot Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <style>
    .dashboard-wrapper { display: flex; height: calc(100vh - 76px); overflow: hidden; }
    .sidebar { width: 250px; background-color: var(--card-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.3s ease; }
    .main-content { flex-grow: 1; overflow-y: auto; background-color: var(--bg-color); padding: 20px; }
    .sidebar-link { padding: 10px 20px; color: var(--text-color); text-decoration: none; display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .sidebar-link:hover, .sidebar-link.active { background-color: rgba(13, 110, 253, 0.1); color: var(--primary); }
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 1050; height: 100vh; top: 0; transform: translateX(-100%); background-color: var(--bg-color-alt) !important; box-shadow: var(--glass-shadow); }
      .sidebar.show { transform: translateX(0); }
      body.rtl-mode .sidebar { transform: translateX(100%); }
      body.rtl-mode .sidebar.show { transform: translateX(0); }
    }
  </style>
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
    }
    const savedDir = localStorage.getItem('dir');
    if (savedDir) {
        document.documentElement.setAttribute('dir', savedDir);
    }
  </script>
</head>
<body class="dashboard-body">
  <!-- Header -->
  <nav class="navbar navbar-expand-xl sticky-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-robot fs-2 text-primary"></i>
        <span class="fs-4">ChatAI<span class="text-gradient">Studio</span></span>
      </a>

      <!-- Right Side Actions (Always Visible) -->
      <div class="d-flex align-items-center gap-3 ms-auto me-3 order-xl-last">
        <!-- Theme & RTL Toggles (Desktop only) -->
        <div class="d-none d-xl-flex align-items-center gap-2">
          <button class="theme-toggle" aria-label="Toggle RTL" title="Toggle RTL" onclick="document.documentElement.setAttribute('dir', document.documentElement.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl'); localStorage.setItem('dir', document.documentElement.getAttribute('dir'));">
            <i class="bi bi-arrow-left-right"></i>
          </button>
          <button class="theme-toggle" aria-label="Toggle Theme" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); localStorage.setItem('theme', document.documentElement.getAttribute('data-theme'));">
            <i class="bi bi-sun"></i>
          </button>
        </div>
        
        <!-- User Profile with Avatar Image -->
        <div class="d-flex align-items-center gap-2 border-start ps-3 border-secondary border-opacity-25">
          <img src="assets/images/david.png" alt="User Profile" class="rounded-circle border border-primary border-2" style="width: 32px; height: 32px; object-fit: cover;">
          <span class="fw-bold fs-6 d-none d-md-inline" style="color: var(--text-color);">User Name</span>
        </div>
      </div>

      <button class="navbar-toggler btn-outline-glass border-0" type="button" onclick="document.getElementById('dashboard-sidebar').classList.add('show')">
        <i class="bi bi-list fs-2 text-primary"></i>
      </button>
    </div>
  </nav>

  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="dashboard-sidebar">
      <div class="p-3 border-bottom d-flex align-items-center justify-content-end d-md-none">
        <button class="btn btn-sm btn-light" id="sidebar-toggle"><i class="bi bi-x fs-4"></i></button>
      </div>
      <div class="flex-grow-1 py-3" style="overflow-y: auto;">
        <small class="text-muted px-3 mb-2 d-block text-uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 1px;">Dashboard</small>
        <a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid"></i> Overview</a>
        <a href="knowledge-base.html" class="sidebar-link active"><i class="bi bi-book"></i> Convos</a>
        <a href="live-logs.html" class="sidebar-link"><i class="bi bi-chat-dots"></i> Live Logs</a>
        <a href="analytics.html" class="sidebar-link"><i class="bi bi-bar-chart"></i> Analytics</a>
        <a href="settings.html" class="sidebar-link"><i class="bi bi-gear"></i> Settings</a>
        <a href="index.html" class="sidebar-link"><i class="bi bi-box-arrow-right"></i> Logout</a>

        <!-- Settings & Toggles (Mobile View Only) -->
        <div class="d-md-none mt-4 pt-3 border-top border-secondary border-opacity-25">
          <div class="px-3 d-flex gap-3 justify-content-start">
            <button class="btn btn-sm btn-outline-glass rounded-circle p-2" aria-label="Toggle RTL" onclick="document.documentElement.setAttribute('dir', document.documentElement.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl'); localStorage.setItem('dir', document.documentElement.getAttribute('dir'));">
              <i class="bi bi-arrow-left-right"></i>
            </button>
            <button class="btn btn-sm btn-outline-glass rounded-circle p-2" aria-label="Toggle Theme" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); localStorage.setItem('theme', document.documentElement.getAttribute('data-theme'));">
              <i class="bi bi-sun"></i>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-2">
          <h2 class="h4 mb-0">Knowledge Base</h2>
        </div>
        <button class="btn btn-primary-gradient btn-sm" data-bs-toggle="modal" data-bs-target="#addDocModal"><i class="bi bi-plus"></i> Add Document</button>
      </div>
      
      <div class="card card-custom p-3 text-start">
        <div class="table-responsive">
          <table class="table table-hover align-middle" id="kb-table">
            <thead>
              <tr>
                <th>Document Title</th>
                <th>Status</th>
                <th>Last Updated</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><i class="bi bi-file-earmark-text me-2 text-primary"></i> Return Policy <small class="text-muted">(FAQ Document)</small></td>
                <td><span class="badge bg-success"><i class="bi bi-check-all me-1"></i> Trained</span></td>
                <td>Oct 12, 2026</td>
                <td>
                  <button class="btn btn-sm btn-light py-1 px-2"><i class="bi bi-pencil"></i></button>
                  <button class="btn btn-sm btn-light text-danger py-1 px-2 delete-kb"><i class="bi bi-trash"></i></button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Add Document Modal -->
      <div class="modal fade" id="addDocModal" tabindex="-1" aria-labelledby="addDocModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content glass-panel border border-secondary border-opacity-25" style="background-color: var(--bg-color-alt);">
            <div class="modal-header border-bottom border-secondary border-opacity-25">
              <h5 class="modal-title fw-bold" id="addDocModalLabel">Add Knowledge Source</h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="kb-add-form">
              <div class="modal-body">
                <div class="mb-3">
                  <label for="kb-doc-title" class="form-label small text-muted">Source Name or URL</label>
                  <input type="text" class="form-control bg-transparent text-white border-secondary border-opacity-50" id="kb-doc-title" placeholder="e.g., Shipping & Delivery Terms or https://example.com/faq" required>
                </div>
                <div class="mb-3">
                  <label for="kb-doc-type" class="form-label small text-muted">Source Type</label>
                  <select class="form-select bg-transparent text-white border-secondary border-opacity-50" id="kb-doc-type" style="cursor: pointer;">
                    <option value="FAQ Document" class="bg-dark text-white">FAQ Document</option>
                    <option value="Website URL" class="bg-dark text-white">Website URL</option>
                    <option value="PDF Manual" class="bg-dark text-white">PDF Manual</option>
                  </select>
                </div>
              </div>
              <div class="modal-footer border-top border-secondary border-opacity-25">
                <button type="button" class="btn btn-outline-glass btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-primary-gradient btn-sm">Add & Train Agent</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
