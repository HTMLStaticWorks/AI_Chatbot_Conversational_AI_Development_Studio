<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Logs - AI Chatbot Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

  <style>
    /* Dashboard specific layout */
    .dashboard-wrapper { display: flex; height: 100vh; overflow: hidden; width: 100vw; }
    .sidebar { width: 260px; min-width: 260px; flex-shrink: 0; background-color: var(--card-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.3s ease; }
    .content-area { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }
    .dashboard-header { height: 76px; border-bottom: 1px solid var(--border-color); background-color: var(--card-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; flex-shrink: 0; }
    .main-content { flex-grow: 1; overflow-y: auto; background-color: var(--bg-color); padding: 20px; }
    .sidebar-link { padding: 10px 20px; color: var(--text-color); text-decoration: none; display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .sidebar-link:hover, .sidebar-link.active { background-color: rgba(13, 110, 253, 0.1); color: var(--primary); }
    .sidebar-circle-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 !important;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      transition: var(--transition);
    }
    .sidebar-circle-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--primary);
    }
    .sidebar-close-btn {
      display: none !important;
    }
    .header-brand {
      display: none !important;
    }
    .dashboard-header .navbar-toggler {
      display: none !important;
    }
    
    /* Desktop default styling (> 1100px) */
    .header-toggles {
      display: flex !important;
    }
    .sidebar-toggles-container {
      display: none !important;
    }

    /* Mobile/Tablet viewports (300px to 1100px) */
    @media (max-width: 1100px) {
      .sidebar {
        position: fixed;
        z-index: 1050;
        height: 100vh;
        top: 0;
        left: 0;
        width: 300px;
        transform: translateX(-100%);
        background-color: var(--bg-color-alt) !important;
        box-shadow: var(--glass-shadow);
      }
      .sidebar.show {
        transform: translateX(0);
      }
      html[dir="rtl"] .sidebar {
        left: auto;
        right: 0;
        transform: translateX(100%);
      }
      html[dir="rtl"] .sidebar.show {
        transform: translateX(0);
      }
      .sidebar-close-btn {
        display: inline-flex !important;
      }
      .header-brand {
        display: flex !important;
      }
      .dashboard-header .navbar-toggler {
        display: block !important;
      }
      .header-toggles {
        display: none !important;
      }
      .sidebar-toggles-container {
        display: block !important;
      }
    }
    @media (max-width: 576px) {
      .sidebar {
        width: 100% !important;
      }
    }
  </style>
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
    }
    const savedDir = localStorage.getItem('dir');
    if (savedDir) {
        document.documentElement.setAttribute('dir', savedDir);
    }
  </script>
</head>
<body class="dashboard-body">
  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="dashboard-sidebar">
      <div class="px-4 py-3 d-flex align-items-center justify-content-between">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
          <i class="bi bi-robot fs-3 text-primary"></i>
          <span class="fs-4">ChatAI<span class="text-gradient">Studio</span></span>
        </a>
        <button class="sidebar-circle-btn sidebar-close-btn" id="sidebar-toggle"><i class="bi bi-x fs-4"></i></button>
      </div>
      <!-- User Profile Card in Sidebar -->
      <div class="px-4 py-3 border-bottom border-secondary border-opacity-10 d-flex align-items-center gap-3">
        <img src="assets/images/david.png" alt="User Profile" class="rounded-circle border border-primary border-2" style="width: 40px; height: 40px; object-fit: cover;">
        <div class="d-flex flex-column">
          <span class="fw-bold fs-6" style="color: var(--text-color);">David Miller</span>
          <span class="text-muted small" style="font-size: 0.75rem;">Administrator</span>
        </div>
      </div>
      <div class="flex-grow-1 py-3" style="overflow-y: auto;">
        <small class="text-muted px-3 mb-2 d-block text-uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 1px;">Dashboard</small>
        <a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid"></i> Overview</a>
        <a href="knowledge-base.html" class="sidebar-link"><i class="bi bi-book"></i> Convos</a>
        <a href="live-logs.html" class="sidebar-link active"><i class="bi bi-chat-dots"></i> Live Logs</a>
        <a href="analytics.html" class="sidebar-link"><i class="bi bi-bar-chart"></i> Analytics</a>
        <a href="settings.html" class="sidebar-link"><i class="bi bi-gear"></i> Settings</a>
        <a href="index.html" class="sidebar-link"><i class="bi bi-box-arrow-right"></i> Logout</a>

        <!-- Settings & Toggles (Mobile View Only) -->
        <div class="sidebar-toggles-container mt-4 pt-3 border-top border-secondary border-opacity-25">
          <div class="px-3 d-flex gap-3 justify-content-start">
            <button class="sidebar-circle-btn" aria-label="Toggle RTL" onclick="document.documentElement.setAttribute('dir', document.documentElement.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl'); localStorage.setItem('dir', document.documentElement.getAttribute('dir'));">
              <i class="bi bi-arrow-left-right"></i>
            </button>
            <button class="sidebar-circle-btn" aria-label="Toggle Theme" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); localStorage.setItem('theme', document.documentElement.getAttribute('data-theme'));">
              <i class="bi bi-sun"></i>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Content Area (Floating Toggles + Main Content) -->
    <div class="content-area">

      <!-- Main Content -->
      <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-2">
          <h2 class="h4 mb-0">Live Conversation Logs</h2>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="theme-toggle" aria-label="Toggle RTL" title="Toggle RTL" onclick="document.documentElement.setAttribute('dir', document.documentElement.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl'); localStorage.setItem('dir', document.documentElement.getAttribute('dir'));">
            <i class="bi bi-arrow-left-right"></i>
          </button>
          <button class="theme-toggle" aria-label="Toggle Theme" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); localStorage.setItem('theme', document.documentElement.getAttribute('data-theme'));">
            <i class="bi bi-sun"></i>
          </button>
          <button class="navbar-toggler btn-outline-glass border-0 d-xl-none" type="button" onclick="document.getElementById('dashboard-sidebar').classList.add('show')">
            <i class="bi bi-list fs-2 text-primary"></i>
          </button>
        </div>
      </div>

      <div class="row g-4">
        <!-- Logs Table Column -->
        <div class="col-lg-7">
          <div class="card card-custom p-3 text-start h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span class="text-muted small"><i class="bi bi-arrow-repeat spin text-primary me-1"></i> Live updating logs...</span>
            </div>
            <div class="table-responsive">
              <table class="table table-hover align-middle" id="logs-table">
                <thead>
                  <tr>
                    <th>User ID</th>
                    <th>Last Message</th>
                    <th>Status</th>
                    <th>Time</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Filled dynamically via dashboard.js -->
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Transcript Details Column -->
        <div class="col-lg-5">
          <div class="transcript-panel text-start">
            <div class="d-flex justify-content-between align-items-center pb-2 border-bottom border-secondary border-opacity-25 mb-3">
              <div>
                <h5 class="fw-bold mb-1" id="transcript-user-id">User ID: #1024</h5>
                <small class="text-muted">Live Conversation Transcript</small>
              </div>
              <div id="transcript-status-badge">
                <span class="badge bg-success">Resolved (AI)</span>
              </div>
            </div>

            <!-- Messages stream -->
            <div class="transcript-messages d-flex flex-column gap-3" id="log-transcript-messages">
              <!-- Injected dynamically via dashboard.js -->
            </div>

            <!-- Handoff Action -->
            <div class="mt-4 pt-3 border-top border-secondary border-opacity-25 text-center">
              <button id="takeover-btn" class="btn btn-primary-gradient w-100 btn-sm" style="display: none;"><i class="bi bi-person-fill-gear"></i> Hijack & Speak to Human</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
